<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus SIBI - Isyaratku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .letter-card:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div class="container mx-auto px-4 py-8">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-800">Kamus Isyarat SIBI</h1>
            <p class="text-gray-600 mt-2">Pilih salah satu huruf di bawah ini untuk melihat video panduan gerakan isyaratnya.</p>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4" id="dictionaryGrid">
            </div>
    </div>

    <div id="videoModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-3xl overflow-hidden shadow-2xl max-w-md w-full relative p-6">
            
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-2xl font-bold text-gray-800">Detail Isyarat</h3>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-500 text-xl focus:outline-none transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="rounded-2xl overflow-hidden bg-gray-100 aspect-video flex items-center justify-center border border-gray-100 shadow-inner mb-6">
                <video id="modalVideo" class="w-full h-full object-cover" controls loop muted>
                    Browser kamu tidak mendukung pemutaran video html5.
                </video>
            </div>

            <div class="text-center mb-4">
                <h2 id="modalLetterLabel" class="text-6xl font-extrabold text-blue-700 tracking-tight">A</h2>
            </div>

            <div class="bg-blue-50 bg-opacity-60 border border-blue-100 rounded-2xl p-4">
                <h4 class="font-bold text-blue-900 mb-1">Deskripsi Gerakan:</h4>
                <p id="modalDescription" class="text-gray-700 text-sm leading-relaxed">
                    Loading deskripsi gerakan...
                </p>
            </div>
            
        </div>
    </div>

    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const gridContainer = document.getElementById("dictionaryGrid");
        
        // Path ke folder video kamu di XAMPP
        const videoBasePath = "asset/video/";

        // Data deskripsi gerakan isyarat SIBI A-Z
        const infoGerakan = {
            'A': 'Kepalkan tangan dengan posisi telapak menghadap ke depan, lalu posisikan ibu jari tegak merapat di samping jari telunjuk.',
            'B': 'Buka telapak tangan tegak lurus menghadap ke depan dengan keempat jari rapat ke atas, lalu tekuk ibu jari di depan telapak tangan.',
            'C': 'Lengkungkan kelima jari tangan membentuk setengah lingkaran menyerupai bentuk huruf C.',
            'D': 'Tegakkan jari telunjuk lurus ke atas, sementara ujung jari jempol, tengah, manis, dan kelingking saling bersentuhan membentuk lingkaran.',
            'E': 'Tekuk kelima jari tangan ke arah dalam hingga ujung-ujung jari menyentuh bagian atas telapak tangan, menyerupai cakar rapat.',
            'F': 'Satukan ujung jari telunjuk dan ibu jari membentuk lingkaran, sementara tiga jari lainnya (tengah, manis, kelingking) ditegakkan lurus ke atas.',
            'G': 'Posisikan ibu jari dan jari telunjuk sejajar mendatar mengarah ke samping dengan jarak sedikit terbuka seperti menjepit, jari lain ditekuk.',
            'H': 'Luruskan jari telunjuk dan jari tengah secara sejajar mengarah horizontal ke samping, sementara jari lainnya ditekuk merapat.',
            'I': 'Kepalkan tangan rapat-rapat, lalu tegakkan hanya jari kelingking lurus ke atas menghadap ke depan.',
            'J': 'Tegakkan jari kelingking lurus ke atas, lalu gerakkan tangan ke bawah membentuk lengkungan seperti mengait di udara.',
            'K': 'Tegakkan jari telunjuk dan jari tengah membentuk huruf V, lalu posisikan ujung ibu jari menyentuh bagian tengah dari jari tengah.',
            'L': 'Tegakkan jari telunjuk lurus ke atas dan buka ibu jari lurus ke samping membentuk sudut siku-siku (huruf L).',
            'M': 'Kepalkan tangan ke depan, lalu selipkan ibu jari ke dalam di bawah jari telunjuk, tengah, dan manis (jari kelingking berada di luar).',
            'N': 'Kepalkan tangan ke depan, lalu selipkan ibu jari ke dalam di bawah jari telunjuk dan jari tengah saja.',
            'O': 'Lengkungkan seluruh jari tangan hingga ujung jari jempol bertemu dengan ujung keempat jari lainnya membentuk lingkaran penuh (huruf O).',
            'P': 'Arahkan jari telunjuk lurus ke depan dan jari tengah tegak ke bawah, lalu posisikan jempol menyentuh ruas jari tengah.',
            'Q': 'Arahkan ibu jari dan jari telunjuk ke bawah dengan posisi sedikit terbuka seperti menjepit sesuatu di bagian bawah.',
            'R': 'Tegakkan jari telunjuk dan jari tengah lurus ke atas, lalu silangkan jari tengah ke belakang jari telunjuk secara rapat.',
            'S': 'Kepalkan tangan dengan kuat menjadi tinju rapat, posisi ibu jari ditekuk horizontal tepat di depan empat jari lainnya.',
            'T': 'Kepalkan tangan rapat ke depan, lalu selipkan ibu jari ke dalam di antara jari telunjuk dan jari tengah.',
            'U': 'Tegakkan jari telunjuk dan jari tengah lurus ke atas secara rapat berdampingan, jari lainnya ditekuk bersama jempol.',
            'V': 'Tegakkan jari telunjuk dan jari tengah membentuk huruf V terbuka lebar, jari lainnya ditekuk merapat.',
            'W': 'Tegakkan jari telunjuk, tengah, dan manis terbuka ke atas membentuk huruf W, sedangkan jari kelingking ditekuk ditahan oleh jempol.',
            'X': 'Kepalkan tangan, lalu tegakkan jari telunjuk dan tekuk setengah lingkaran membentuk kait atau pancing menghadap ke atas.',
            'Y': 'Buka ibu jari dan jari kelingking lebar-lebar lurus ke atas menjauh, sementara jari telunjuk, tengah, dan manis ditekuk rapat ke telapak.',
            'Z': 'Jari telunjuk ditegakkan lurus ke atas, lalu digerakkan secara dinamis di udara mengikuti alur garis menulis huruf Z (dari kiri ke kanan, diagonal ke kiri bawah, lalu ke kanan).'
        };

        // Render Kartu Huruf A-Z
        alphabet.forEach(letter => {
            const card = document.createElement("div");
            card.className = "letter-card bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center justify-center cursor-pointer hover:shadow-md hover:border-blue-500 transition-all";
            card.setAttribute("onclick", `playVideo('${letter}')`);

            card.innerHTML = `
                <span class="text-4xl font-extrabold text-blue-700">${letter}</span>
                <span class="text-xs text-gray-400 mt-2 font-medium bg-gray-100 px-3 py-1 rounded-full">
                    <i class="fa-solid fa-play text-[10px] mr-1"></i> Lihat Video
                </span>
            `;
            gridContainer.appendChild(card);
        });

        // Fungsi Membuka Modal & Mengganti Video (Anti-Cache Version)
function playVideo(letter) {
    const modal = document.getElementById("videoModal");
    const video = document.getElementById("modalVideo");
    const label = document.getElementById("modalLetterLabel");
    const desc = document.getElementById("modalDescription");

    // 1. Update Label Huruf dan Teks Deskripsi
    label.innerText = letter;
    desc.innerText = infoGerakan[letter] || "Deskripsi gerakan belum tersedia.";
    
    // 2. Buat string acak biar browser gak pake cache video lama
    const cacheBuster = new Date().getTime();
    
    // 3. Tembak src baru + pasang cache buster di ujungnya
    video.src = `${videoBasePath}${letter.toLowerCase()}.mp4?v=${cacheBuster}`;
    
    // 4. Paksa browser me-refresh total media player instannya
    video.load();
    
    // 5. Munculkan Modal
    modal.classList.remove("hidden");
    
    // 6. Mainkan videonya otomatis setelah load
    video.play().catch(err => {
        console.log("Autoplay ditahan browser, klik play manual.", err);
    });
}
        // Fungsi Tutup Modal
        function closeModal() {
            const modal = document.getElementById("videoModal");
            const video = document.getElementById("modalVideo");
            
            modal.classList.add("hidden");
            video.pause(); // Matikan video agar suaranya tidak bocor saat ditutup
        }

        // Tutup otomatis jika klik di luar kotak modal
        window.onclick = function(event) {
            const modal = document.getElementById("videoModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
